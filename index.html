<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shriji Patel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'Open Sauce Sans';
      src: url('fonts/OpenSauceSans-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --text: #e8e4dc;
      --muted: #6b6b6b;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 10;
    }

    .hero {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      animation: fadeDown 0.9s ease both;
      position: relative;
      z-index: 1;
    }

    .hero img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .hero img {
  width: 100%;
  height: auto;
  display: block;
  }

    nav {
      display: none;
    }

    main {
      width: 100%;
      max-width: 1100px;
      padding: 60px 0 80px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 52px 32px;
      min-height: 300px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease,
        border-color 0.3s ease;
      animation: fadeUp 0.8s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.3s; }
    .card:nth-child(2) { animation-delay: 0.45s; }
    .card:nth-child(3) { animation-delay: 0.6s; }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, rgba(200,169,110,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: #bfa46a;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.25),
        0 2px 10px rgba(200, 169, 110, 0.08);
    }

    .card:hover::before { transform: scaleX(1); }
    .card:hover::after { opacity: 1; }

    .card-title {
      font-family: 'Open Sauce Sans', Arial, sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-top: 8px;
      position: relative;
      z-index: 2;
    }

    .card-arrow {
      position: absolute;
      bottom: 28px;
      right: 28px;
      font-size: 1rem;
      color: var(--border);
      transition: transform 0.3s ease, color 0.3s ease;
      z-index: 2;
    }

    .card:hover .card-arrow {
      transform: translate(4px, -4px);
      color: var(--accent);
    }

    footer {
      width: 100%;
      max-width: 1100px;
      padding: 24px 0 40px;
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-start;
      align-items: center;
      animation: fadeUp 0.8s 0.7s ease both;
    }

    .footer-copy {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      main, footer { padding-left: 24px; padding-right: 24px; }
      .cards-grid { grid-template-columns: 1fr; }
      .card { min-height: 220px; }
      .card-title { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="images/header.jpg" alt="Shriji Patel" />
  </div>

  <nav>
    <div class="nav-inner">
      <span class="nav-item">About</span>
      <div class="nav-divider"></div>
      <span class="nav-item">Portfolio</span>
      <div class="nav-divider"></div>
      <span class="nav-item">FAQs</span>
    </div>
  </nav>

  <main>
    <div class="cards-grid">
      <a href="about.html" class="card">
        <h2 class="card-title">About</h2>
        <span class="card-arrow">↗</span>
      </a>

      <a href="portfolio.html" class="card">
        <h2 class="card-title">Portfolio</h2>
        <span class="card-arrow">↗</span>
      </a>

      <a href="faqs.html" class="card">
        <h2 class="card-title">FAQs</h2>
        <span class="card-arrow">↗</span>
      </a>
    </div>
  </main>

  <footer>
    <span class="footer-copy">&copy; 2026 Shriji Patel</span>
  </footer>

</body>
</html>
