<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shriji Patel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --text: #e8e4dc;
      --muted: #6b6b6b;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Thin top accent line */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 10;
    }

    /* === HERO IMAGE === */
    .hero {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      animation: fadeDown 0.9s ease both;
      position: relative;
      z-index: 1;
    }

    .hero img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    /* === NAV === */
    nav {
      width: 100%;
      max-width: 1100px;
      padding: 40px 40px 0;
      position: relative;
      z-index: 1;
      animation: fadeDown 0.9s 0.15s ease both;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      gap: 40px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .nav-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: default;
      user-select: none;
      transition: color 0.2s;
    }

    .nav-divider {
      width: 1px;
      height: 12px;
      background: var(--border);
    }

    /* === MAIN GRID === */
    main {
      width: 100%;
      max-width: 1100px;
      padding: 60px 40px 80px;
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* === CARD === */
    .card {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s;
      animation: fadeUp 0.8s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.3s; }
    .card:nth-child(2) { animation-delay: 0.45s; }
    .card:nth-child(3) { animation-delay: 0.6s; }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, rgba(200,169,110,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card:hover {
      border-color: #3a3a3a;
      transform: translateY(-4px);
    }

    .card:hover::before { transform: scaleX(1); }
    .card:hover::after  { opacity: 1; }

    .card-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.85rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .card-desc {
      font-size: 0.7rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .card-arrow {
      position: absolute;
      bottom: 28px;
      right: 28px;
      font-size: 1rem;
      color: var(--border);
      transition: color 0.3s, transform 0.3s;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translate(3px, -3px);
    }

    /* === FOOTER === */
    footer {
      width: 100%;
      max-width: 1100px;
      padding: 24px 40px 40px;
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.8s 0.7s ease both;
    }

    .footer-copy {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .social-link {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .social-link:hover { border-color: var(--accent); }

    /* === ANIMATIONS === */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      nav, main, footer { padding-left: 24px; padding-right: 24px; }
      .cards-grid { grid-template-columns: 1fr; }
      .nav-inner { gap: 24px; }
    }
  </style>
</head>
