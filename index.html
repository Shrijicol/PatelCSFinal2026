<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shriji Patel</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    @font-face {
      font-family: 'Open Sauce Sans';
      src: url('fonts/OpenSauceSans-Bold.ttf') format('truetype');
      font-weight: 700;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --text: #e8e4dc;
      --muted: #6b6b6b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .hero {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      animation: fadeDown 0.9s ease both;
    }

    .hero img {
      width: 100%;
      display: block;
    }

    main {
      width: 100%;
      max-width: 1100px;
      padding: 40px 0 80px;
    }

    .socials-section {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 60px;
      animation: fadeUp 0.8s ease both;
    }

    .socials-grid {
      display: grid;
      grid-template-columns: repeat(6, 120px);
      gap: 26px;
    }

    .social-card {
      width: 120px;
      height: 120px;
      background: linear-gradient(145deg, #2b313a, #242a33);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      position: relative;
      box-shadow:
        0 8px 0 rgba(16,20,26,0.95),
        0 14px 24px rgba(0,0,0,0.28);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .social-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow:
        0 10px 0 rgba(16,20,26,0.95),
        0 18px 30px rgba(0,0,0,0.34);
    }

    .social-card img {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 52px 32px;
      min-height: 300px;
      position: relative;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .card-title {
      font-family: 'Open Sauce Sans', serif;
      font-size: 2rem;
      margin-top: 8px;
    }

    .card-arrow {
      position: absolute;
      bottom: 28px;
      right: 28px;
    }

    .intro-text {
      margin-top: 80px;
      text-align: center;
      max-width: 900px;
    }

    .intro-main {
      font-family: "Times New Roman", serif;
      font-size: 1.6rem;
      margin-bottom: 16px;
    }

    .intro-sub {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      color: var(--text);
    }

    footer {
      width: 100%;
      max-width: 1100px;
      padding: 24px 0 40px;
      border-top: 1px solid var(--border);
    }

    .footer-copy {
      font-size: 0.6rem;
      color: var(--muted);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; }
    }

    @media (max-width: 900px) {
      .socials-grid {
        grid-template-columns: repeat(3, 120px);
      }
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }

      .socials-grid {
        grid-template-columns: repeat(2, 120px);
      }
    }

  </style>
</head>

<body>

  <div class="hero">
    <img src="header.jpg" alt="Shriji Patel" />
  </div>

  <main>

    <div class="socials-section">
      <div class="socials-grid">

        <a href="#" class="social-card youtube"><img src="youtube.png"></a>
        <a href="#" class="social-card twitch"><img src="twitch.png"></a>
        <a href="#" class="social-card x"><img src="x.png"></a>
        <a href="#" class="social-card instagram"><img src="instagram.png"></a>
        <a href="#" class="social-card tiktok"><img src="tiktok.png"></a>
        <a href="#" class="social-card letterboxd"><img src="letterboxd.png"></a>
        
      </div>
    </div>

    <div class="cards-grid">
      <a href="about.html" class="card">
        <h2 class="card-title">About</h2>
        <span class="card-arrow">↗</span>
      </a>

      <a href="portfolio.html" class="card">
        <h2 class="card-title">Portfolio</h2>
        <span class="card-arrow">↗</span>
      </a>

      <a href="faqs.html" class="card">
        <h2 class="card-title">FAQs</h2>
        <span class="card-arrow">↗</span>
      </a>
    </div>

    <div class="intro-text">
      <p class="intro-main">Hello... my name is Shriji!</p>
      <p class="intro-sub">
        And this is my website! I make day-in-my-life videos, vlog style content, and overall live a prosperous and stress free life. Feel free to check out all my socials!
      </p>
    </div>

  </main>

  <footer>
    <span class="footer-copy">© 2026 Shriji Patel</span>
  </footer>

</body>
</html>
